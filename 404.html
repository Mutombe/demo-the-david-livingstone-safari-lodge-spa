<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The David Livingstone Safari Lodge & Spa</title>
    <script>
      // SPA shim: store the deep route so main.jsx can rehydrate it after redirect to index.html.
      (function () {
        try {
          var path = window.location.pathname + window.location.search + window.location.hash;
          sessionStorage.setItem('tdl:spa-redirect', path);
          window.location.replace('/');
        } catch (e) {
          window.location.replace('/');
        }
      })();
    </script>
  </head>
  <body></body>
</html>
